coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 1%
        informational: false
    patch:
      default:
        target: 95%
        threshold: 1%
        informational: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

github_checks:
  annotations: true

